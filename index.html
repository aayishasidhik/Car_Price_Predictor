<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="static/css/style.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

    <title>Car Price Predictor</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="row">
            <div class="glass-card">
                <div class="header">
                    <div class="col-12" style="text-align: center">
                        <h1>🚗 Welcome to Car Price Predictor</h1>
                    </div>
                </div>
                <div class="card-body">
                    <form method="post" accept-charset="utf-8">

                        <div class="col-10 form-group" style="text-align: center">
                            <label><b>Select Company: </b></label>
                            <select class="selectpicker form-group" id="company" name="company" required="1" onchange="load_car_models(this.id, 'car_model')">

                                {% for company in companies %}

                                <option value="{{ company }}">{{ company }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-10 form-group" style="text-align: center">
                            <label><b>Select Model: </b></label>
                            <select class="selectpicker form-group" id="car_model" name="car_model" required="1">
                                
                            </select>
                        </div>
                        <div class="col-10 form-group" style="text-align: center">
                            <label><b>Select Year of Purchase: </b></label>
                            <select class="selectpicker form-group" id="year" name="year" required="1">
                                {% for year in years %}

                                <option value="{{ year }}">{{ year }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-10 form-group" style="text-align: center">
                            <label><b>Select Fuel Type: </b></label>
                            <select class="selectpicker form-group" id="fuel_type" name="fuel_type" required="1">
                                {% for fuel_type in fuel_types %}

                                <option value="{{ fuel_type }}">{{ fuel_type }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-10 form-group" style="text-align: center">
                            <label><b>Enter number of kilometers travelled: </b></label>
                            <input class="form-control" type="text" id="kilo_driven" name="kilo_driven" placeholder="Enter no. of kilometers travelled">
                        </div>
                        <div class="col-10 form-group" style="text-align: center">
                            <button class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>
                            </div>
                    </form>
                    <br>
                    <div class="row">
                        <div class='col-12' style="text-align: center">
                            <h3><span id="prediction"></span></h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
    function load_car_models(company_id, car_model_id)
    {
        var company = document.getElementById(company_id);
        var car_model = document.getElementById(car_model_id);

        car_model.value="";
        car_model.innerHTML = "";

         {% for company in companies %}
            if(company.value == "{{company}}")
            {
                {% for model in car_models %}
                    {% if company in model %}
                        var newOption=document.createElement("option");
                        newOption.value="{{ model }}";
                        newOption.innerHTML="{{ model }}";
                        car_model.options.add(newOption);
                        {% endif %}
                        {% endfor %}
            }
            {% endfor %}
    }
    function form_handler(event)
    {
        event.preventDefault();
    }

    function send_data()
    {
        document.getElementById("prediction").innerHTML =
        "Wait! Predicting Price...";
        document.querySelector('form').addEventListener('submit', form_handler);
        //Send and Receive data to /predict
        var fd= new FormData(document.querySelector('form'));

        var xhr= new XMLHttpRequest();
        xhr.open('POST','/predict',true);
        document.getElementById("prediction").innerHTML="Wait! Predicting Price..."

        xhr.onreadystatechange=function()
        {
            if(xhr.readyState == XMLHttpRequest.DONE)
        {
            document.getElementById("prediction").innerHTML="Prediction: ₹"+xhr.responseText;
        }
        }
        xhr.onload=function(){};
        xhr.send(fd);
    }
</script>
    <!-- Option 2: jQuery, Popper.js, and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
